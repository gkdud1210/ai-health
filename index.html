<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 개인 건강관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="logo-icon">🩺</div>
    <div>
      <div class="logo-text">HealthAI</div>
      <div class="logo-sub">AI 기반 건강 패턴 분석 시스템</div>
    </div>
  </header>

  <div class="page-wrapper">
    <h1 class="page-title">건강 상태 통합 분석</h1>
    <p class="page-subtitle">현재 증상과 생활 패턴을 입력하시면 AI가 연관성을 분석하고 관리 방향을 제안합니다.</p>

    <div class="card">
      <form id="healthForm">

        <div class="field-group">
          <div class="field-label">
            <span class="step-badge">1</span>
            주요 증상
          </div>
          <input type="text" id="mainSymptom" placeholder="예: 무릎 통증, 두통, 피로감" />
        </div>

        <div class="field-group">
          <div class="field-label">
            <span class="step-badge">2</span>
            에너지 상태
          </div>
          <div class="select-wrapper">
            <select id="energy">
              <option value="good">활력 있음</option>
              <option value="normal">보통</option>
              <option value="low">쉽게 피곤</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">
            <span class="step-badge">3</span>
            수면 상태
          </div>
          <div class="select-wrapper">
            <select id="sleep">
              <option value="good">잘 잠</option>
              <option value="bad">잠들기 어렵거나 자주 깸</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">
            <span class="step-badge">4</span>
            스트레스
          </div>
          <div class="select-wrapper">
            <select id="stress">
              <option value="low">낮음</option>
              <option value="medium">보통</option>
              <option value="high">높음</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">
            <span class="step-badge">5</span>
            소화 상태
          </div>
          <div class="select-wrapper">
            <select id="digestion">
              <option value="good">편안함</option>
              <option value="bad">더부룩 / 변비 / 설사</option>
            </select>
          </div>
        </div>

        <hr class="form-divider" />

        <button type="submit" class="btn-submit">통합 분석 시작</button>
        <p class="disclaimer">본 서비스는 의학적 진단을 대체하지 않으며, 참고 목적으로만 사용하시기 바랍니다.</p>
      </form>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
